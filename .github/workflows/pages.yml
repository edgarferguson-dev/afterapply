# Publishes the Vite production build (folder `dist/`) to the `gh-pages` branch.
# GitHub Pages must be set to deploy from that branch (see README).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (base /afterapply/)
        run: npm run build

      - name: Verify dist contains hashed assets under /afterapply/
        run: |
          test -f dist/index.html
          grep -q '/afterapply/assets/' dist/index.html || (echo "Expected /afterapply/ in index.html asset paths" && exit 1)

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
